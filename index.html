<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A joyful, accessible temperature converter for eight temperature scales.">
  <meta name="theme-color" content="#8b5cf6">
  <title>Pride Temperature Converter</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>
  <div class="sparkles" aria-hidden="true"></div>
  <main class="app-shell">
    <header class="hero">
      <span class="eyebrow">🌈 Proudly precise</span>
      <h1>Temperature, but make it <span>fabulous.</span></h1>
      <p>Convert between eight temperature scales with a little color and a lot of sparkle.</p>
    </header>

    <form class="converter" id="converter" novalidate>
      <div class="field temperature-field">
        <label for="temperature">Temperature</label>
        <input id="temperature" name="temperature" type="number" step="any" inputmode="decimal" value="20" required>
      </div>

      <div class="unit-grid">
        <div class="field">
          <label for="fromUnit">From</label>
          <select id="fromUnit" name="fromUnit"></select>
        </div>
        <button class="swap" id="swap" type="button" aria-label="Swap temperature units" title="Swap units">⇄</button>
        <div class="field">
          <label for="toUnit">To</label>
          <select id="toUnit" name="toUnit"></select>
        </div>
      </div>

      <button class="convert" type="submit"><span>Convert</span><span aria-hidden="true">✨</span></button>

      <section class="result" aria-live="polite" aria-atomic="true">
        <span class="result-label">Result</span>
        <strong id="result">68 °F</strong>
        <span id="formula">20 °C equals 68 °F</span>
      </section>
    </form>

    <footer>Made with <span aria-label="pride">🏳️‍🌈</span>, paws, and good math.</footer>
  </main>
  <script src="index.js"></script>
</body>
</html>
